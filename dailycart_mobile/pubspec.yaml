name: dailycart_mobile
description: DailyCart grocery delivery mobile app for Android and iOS.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^4.12.1
  firebase_messaging: ^16.4.3

  cached_network_image: ^3.4.1
  connectivity_plus: ^7.1.1
  dio: ^5.9.1
  firebase_analytics: ^12.4.5
  firebase_crashlytics: ^5.2.6
  flutter_dotenv: ^6.0.1
  flutter_local_notifications: ^22.0.0
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.3.1
  geocoding: ^4.0.0
  geolocator: ^14.0.2
  go_router: ^17.3.0
  google_fonts: ^8.1.0
  google_maps_flutter: ^2.17.1
  image_picker: ^1.2.2
  intl: ^0.20.2
  package_info_plus: ^10.2.1
  shared_preferences: ^2.5.5
  shimmer: ^3.0.0
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.8
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: "#F4FFF7"
  adaptive_icon_foreground: assets/images/logo.png

flutter_native_splash:
  color: "#F4FFF7"
  image: assets/images/logo.png
  android: true
  ios: true
  web: false
