name: dailycart_mobile
description: DailyCart grocery delivery mobile app for Android and iOS.
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.0

dependencies:
  flutter:
    sdk: flutter

  firebase_core: ^3.15.0
  firebase_messaging: ^15.0.0

  cached_network_image: any
  connectivity_plus: any
  dio: ^5.9.1
  firebase_analytics: any
  firebase_crashlytics: any
  flutter_dotenv: any
  flutter_local_notifications: any
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^10.3.1
  geocoding: any
  geolocator: any
  go_router: ^17.3.0
  google_fonts: any
  google_maps_flutter: ^2.17.1
  image_picker: any
  intl: any
  shared_preferences: ^2.5.5
  shimmer: any
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_launcher_icons: any
  flutter_lints: any
  flutter_native_splash: any
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - .env

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
  adaptive_icon_background: "#F4FFF7"
  adaptive_icon_foreground: assets/images/logo.png

flutter_native_splash:
  color: "#F4FFF7"
  image: assets/images/logo.png
  android: true
  ios: true
  web: false
